<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders – Maathruthva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Jost',sans-serif;background:#fff8f0;color:#333;min-height:100vh;}

    /* ── Header ── */
    header{background:#fff;border-bottom:1px solid #f0e6d3;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .brand{font-family:'Cormorant Garamond',serif;font-size:22px;color:#b5451b;text-decoration:none;font-weight:600;}
    .nav-actions{display:flex;gap:12px;align-items:center;}
    .btn-back{background:none;border:1.5px solid #b5451b;color:#b5451b;padding:7px 18px;border-radius:20px;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;text-decoration:none;}
    .btn-back:hover{background:#b5451b;color:#fff;}

    /* ── Page ── */
    .page{max-width:860px;margin:0 auto;padding:32px 20px 60px;}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:32px;color:#b5451b;margin-bottom:6px;}
    .page-sub{color:#888;font-size:14px;margin-bottom:32px;}

    /* ── States ── */
    .state-box{text-align:center;padding:80px 20px;}
    .state-box svg{width:64px;height:64px;opacity:.25;margin-bottom:16px;}
    .state-box h3{font-family:'Cormorant Garamond',serif;font-size:24px;color:#555;margin-bottom:8px;}
    .state-box p{color:#999;font-size:14px;margin-bottom:20px;}
    .btn-shop{background:#b5451b;color:#fff;border:none;padding:12px 28px;border-radius:24px;font-family:'Jost',sans-serif;font-size:14px;cursor:pointer;}
    .btn-shop:hover{background:#9a3a17;}

    /* ── Order Card ── */
    .order-card{background:#fff;border-radius:14px;margin-bottom:20px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);}
    .order-header{background:#fff8f0;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border-bottom:1px solid #f0e6d3;}
    .order-meta{display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
    .order-date{font-size:13px;color:#888;}
    .order-id{font-size:12px;color:#b5451b;background:#ffeee7;padding:3px 10px;border-radius:10px;font-weight:500;}
    .order-status{font-size:12px;padding:3px 12px;border-radius:10px;font-weight:500;}
    .status-confirmed{background:#e8f5e9;color:#2e7d32;}
    .order-total{font-size:15px;font-weight:600;color:#333;}

    /* ── Items ── */
    .order-items{padding:16px 20px;}
    .order-item{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid #f9f0e8;}
    .order-item:last-child{border-bottom:none;}
    .item-img{width:64px;height:64px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#f0e6d3;}
    .item-img img{width:100%;height:100%;object-fit:cover;}
    .item-img-placeholder{width:64px;height:64px;border-radius:10px;background:linear-gradient(135deg,#b5451b,#e07a5f);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:20px;font-weight:700;font-family:'Cormorant Garamond',serif;}
    .item-info{flex:1;}
    .item-name{font-weight:500;font-size:14px;color:#333;margin-bottom:3px;}
    .item-meta{font-size:12px;color:#999;}
    .item-price{font-size:14px;color:#b5451b;font-weight:600;text-align:right;}

    /* ── Address ── */
    .order-address{padding:12px 20px 16px;background:#fafafa;border-top:1px solid #f0e6d3;display:flex;justify-content:space-between;align-items:center;gap:12px;}
    .address-block{flex:1;}
    .address-label{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
    .address-text{font-size:13px;color:#666;}
    .btn-track{background:#b5451b;color:#fff;border:none;padding:9px 20px;border-radius:20px;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .btn-track:hover{background:#9a3a17;}

    /* ── Loading spinner ── */
    .spinner{width:36px;height:36px;border:3px solid #f0e6d3;border-top-color:#b5451b;border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:480px){
      .order-header{flex-direction:column;align-items:flex-start;}
      .item-img,.item-img-placeholder{width:52px;height:52px;}
    }
  
    .brand-lockup{display:flex;align-items:center;gap:10px;text-decoration:none;}
      .brand-logo{width:44px;height:44px;border-radius:50%;object-fit:contain;background:#FBF8F0;padding:2px;box-shadow:0 3px 10px -3px rgba(74,104,48,.45);flex-shrink:0;}
      .brand-wordmark{height:32px;width:auto;object-fit:contain;}
  </style>
<script src="product-catalog.js"></script>
</head>

<div class="page">
  <h1 class="page-title">My Orders</h1>
  <p class="page-sub" id="orders-sub">Loading your orders…</p>
  <div id="orders-container"><div class="spinner"></div></div>
</div>

<script src="product-data.js"></script>
<script type="module">
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBWhNCWiT-us4L_J5ihcCiniisX1Jy9SoU",
    authDomain: "maathruthva.firebaseapp.com",
    projectId: "maathruthva",
    storageBucket: "maathruthva.firebasestorage.app",
    messagingSenderId: "772318181453",
    appId: "1:772318181453:web:e736b87f53c264b8cf8404"
  };

  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const container = document.getElementById('orders-container');
  const sub = document.getElementById('orders-sub');

  // Check Firebase Auth state — if session expired, clear localStorage and treat as logged out
  onAuthStateChanged(auth, (firebaseUser) => {
    const stored = JSON.parse(localStorage.getItem('mtr_user') || 'null');
    if (!firebaseUser && stored && stored.loggedIn && !stored.guest) {
      // Firebase session expired — clear local session
      localStorage.removeItem('mtr_user');
      localStorage.removeItem('mtr_addresses');
    }
    loadOrders();
  });

  async function loadOrders() {
  const user = JSON.parse(localStorage.getItem('mtr_user') || 'null');
  if (!user || !user.uid || user.guest) {
    container.innerHTML = `
      <div class="state-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 11c0 2.21-1.79 4-4 4s-4-1.79-4-4 1.79-4 4-4 4 1.79 4 4zm6 8c0-3.31-4.03-6-9-6s-9 2.69-9 6"/></svg>
        <h3>Please log in</h3>
        <p>You need to be logged in to view your orders.</p>
        <button class="btn-shop" onclick="location.href='login.html?next=my-orders.html'">Log In</button>
      </div>`;
    sub.textContent = '';
    return;
  }

  // Build image map from product-data.js
  const imgMap = {};
  if (window.PRODUCT_DATA) {
    window.PRODUCT_DATA.forEach(p => { imgMap[p.name] = { img: p.img, imgClass: p.imgClass }; });
  }

  function formatDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts.seconds ? ts.seconds * 1000 : ts);
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
  }

  function renderItemImg(itemName) {
    const prod = imgMap[itemName];
    if (prod && prod.img) {
      return `<div class="item-img"><img src="${prod.img}" alt="${itemName}"></div>`;
    }
    return `<div class="item-img-placeholder">${getInitials(itemName)}</div>`;
  }

  function renderAddress(addr) {
    if (!addr) return '';
    const parts = [addr.addr1 || addr.line1, addr.addr2 || addr.line2, addr.city, addr.state, addr.pin || addr.pincode].filter(Boolean);
    return parts.join(', ');
  }

  function renderOrder(id, data) {
    const items = data.items || [];
    const itemsHtml = items.map(item => `
      <div class="order-item">
        ${renderItemImg(item.name)}
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">Qty: ${item.qty} &nbsp;·&nbsp; ₹${item.price} each</div>
        </div>
        <div class="item-price">₹${(item.price * item.qty).toFixed(0)}</div>
      </div>`).join('');

    const addrText = renderAddress(data.address);

    return `
      <div class="order-card">
        <div class="order-header">
          <div class="order-meta">
            <span class="order-date">${formatDate(data.createdAt)}</span>
            <span class="order-id">ID: ${(data.paymentId || id).substring(0, 20)}…</span>
            <span class="order-status status-confirmed">${data.status || 'Confirmed'}</span>
          </div>
          <div class="order-total">₹${data.total}</div>
        </div>
        <div class="order-items">${itemsHtml}</div>
        ${addrText ? `<div class="order-address"><div class="address-block"><div class="address-label">Delivery Address</div><div class="address-text">${addrText}</div></div><button class="btn-track" onclick="alert('Tracking ID: ${(data.paymentId||id)}')">Track Order</button></div>` : ''}
      </div>`;
  }

  try {
    const q = query(collection(db, 'users', user.uid, 'orders'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);

    if (snap.empty) {
      container.innerHTML = `
        <div class="state-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M8 8h8M8 16h5"/></svg>
          <h3>No orders yet</h3>
          <p>Your completed orders will appear here.</p>
          <button class="btn-shop" onclick="location.href='Food_Products.html'">Start Shopping</button>
        </div>`;
      sub.textContent = '';
      return;
    }

    const count = snap.size;
    sub.textContent = `${count} order${count > 1 ? 's' : ''} found`;
    container.innerHTML = snap.docs.map(doc => renderOrder(doc.id, doc.data())).join('');
  } catch(e) {
    console.error('Orders fetch error:', e);
    container.innerHTML = `<div class="state-box"><h3>Something went wrong</h3><p>${e.message}</p></div>`;
    sub.textContent = '';
  }
  } // end loadOrders

  loadOrders();
</script>

</body>
