<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seed Food_Products — Maathruthva</title>
  <style>
    body{font-family:sans-serif;max-width:500px;margin:60px auto;padding:0 20px;background:#f5f0e8;}
    h2{color:#b5451b;margin-bottom:8px;}
    p{color:#555;font-size:14px;margin-bottom:24px;}
    button{padding:12px 28px;background:#b5451b;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;}
    button:disabled{background:#ccc;cursor:not-allowed;}
    pre{background:#fff;border:1px solid #e0d8cc;border-radius:8px;padding:14px;font-size:13px;white-space:pre-wrap;margin-top:20px;}
  </style>
</head>
<body>
  <h2>Seed Food_Products to Firestore</h2>
  <p>Click the button to create the <strong>Food_Products</strong> collection with FP01, FP02, FP03 documents.</p>
  <button id="btn" onclick="seed()">Seed Now</button>
  <pre id="log">Waiting...</pre>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const app = initializeApp({
    apiKey: "AIzaSyBWhNCWiT-us4L_J5ihcCiniisX1Jy9SoU",
    authDomain: "maathruthva.firebaseapp.com",
    projectId: "maathruthva",
  });
  const db = getFirestore(app);

  const PRODUCTS = [
    { productId: 'FP01', name: 'Natural Baby Food Mix', isAvailable: 1 },
    { productId: 'FP02', name: 'Growth Mix',            isAvailable: 1 },
    { productId: 'FP03', name: 'Daily Millet Mix',      isAvailable: 1 },
  ];

  window.seed = async function () {
    const btn = document.getElementById('btn');
    const log = document.getElementById('log');
    btn.disabled = true;
    log.textContent = 'Seeding...\n';
    try {
      for (const p of PRODUCTS) {
        await setDoc(doc(db, 'Food_Products', p.productId), p);
        log.textContent += `✅ ${p.productId} — ${p.name}\n`;
      }
      log.textContent += '\n✅ Done! You can close this page now.';
    } catch (e) {
      log.textContent += '\n❌ Error: ' + e.message;
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
